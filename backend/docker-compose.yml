services:
  minio:
    image: minio/minio:latest
    container_name: vng-insider-minio
    ports:
      - "9100:9000"   # S3 API           (host 9100 → container 9000)
      - "9101:9001"   # Web console UI   (host 9101 → container 9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: vng-insider-postgres
    ports:
      - "5433:5432"   # host 5433 → container 5432 (OrbStack chiếm 5432 ngoài)
    environment:
      POSTGRES_USER: vng
      POSTGRES_PASSWORD: vng
      POSTGRES_DB: vng_insider
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vng -d vng_insider"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: vng-insider-adminer
    ports:
      - "8081:8080"   # host 8081 → adminer 8080 (tránh đụng FastAPI 8000)
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
