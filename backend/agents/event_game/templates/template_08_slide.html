<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Be+Vietnam+Pro:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --primary:@@PRIMARY@@; --secondary:@@SECONDARY@@; --accent:@@ACCENT@@;
    --bg:@@BG@@; --text:@@TEXT@@; --muted:@@MUTED@@; --pattern:@@PATTERN@@;
    --tt-accent:var(--accent); --tt-on-accent:var(--bg); }
  @@TREATMENTS_CSS@@
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:var(--bg); }
  body { font-family:'Be Vietnam Pro', system-ui, sans-serif; color:var(--text); }
  .stage { position:relative; width:1080px; height:1920px; overflow:hidden; background:var(--bg); }
  .pattern { position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, var(--pattern) 0 1px, transparent 1px 28px),
      repeating-linear-gradient(-45deg, var(--pattern) 0 1px, transparent 1px 28px); }
  #dark { position:absolute; inset:0; background:var(--bg); will-change:opacity; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; }

  .rule { position:absolute; left:50%; top:430px; width:90px; height:6px; margin-left:-45px; background:var(--accent); }
  .content { position:absolute; left:90px; right:90px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:30px; }
  #kicker { font-weight:700; font-size:30px; letter-spacing:8px; text-transform:uppercase; color:var(--accent);
    will-change:transform,opacity,filter; }
  #title { font-family:'Playfair Display', serif; font-weight:900; font-size:120px; line-height:1.0;
    max-width:900px; display:inline-block; will-change:transform,opacity,filter; }
  #subtitle { font-family:'Playfair Display', serif; font-style:italic; font-weight:700; font-size:46px;
    line-height:1.3; color:var(--muted); max-width:820px; will-change:transform,opacity,filter; }
  .highlights { display:flex; flex-direction:column; gap:16px; align-items:center; }
  .hl { font-weight:600; font-size:32px; line-height:1.25; color:var(--text); will-change:transform,opacity; }
  .meta { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; will-change:transform,opacity; }
  .chip { font-weight:700; font-size:28px; padding:8px 20px; border:2px solid var(--accent); color:var(--text); }
  #cta { position:absolute; left:0; right:0; bottom:250px; text-align:center; font-weight:700; font-size:38px;
    letter-spacing:1px; color:var(--accent); will-change:transform,opacity; }
  #caption { position:absolute; left:70px; right:70px; bottom:120px; text-align:center; font-weight:700;
    font-size:42px; line-height:1.25; color:var(--text); opacity:0; }
</style>
</head>
<body>
  <div class="stage">
    <div class="pattern"></div>
    <div class="rule"></div>
    <div class="content">
      <div id="kicker">@@KICKER@@</div>
      <h1 id="title" class="tt-underline">@@TITLE@@</h1>
      @@SUBTITLE_BLOCK@@
      @@HIGHLIGHTS_BLOCK@@
      @@META_BLOCK@@
    </div>
    <div id="cta">@@CTA@@</div>
    <div id="caption"></div>
    <div id="dark"></div>
    <div id="flash"></div>
  </div>
<script>@@TIMELINE_JS@@</script>
<script>
  window.DURATION_SEC = @@DURATION_SEC@@;
  var CAPS = @@CAPTIONS_JSON@@;
  var FIT = { maxFont: 120, minFont: 60, maxW: 900 };

  window.seek = function (t) {
    var B = window.BT;
    B.bg(t, { fl: 0 });
    B.entrance(t, 'kicker', 0.25, 0.5, -24);
    B.entrance(t, 'title', 0.5, 0.6, 30);      // Playfair tt-underline → giữ 1 khối
    B.entrance(t, 'subtitle', 1.05, 0.55, 22);
    var items = document.querySelectorAll('.hl'), i;
    for (i = 0; i < items.length; i++) { var p = B.seg(t, 1.3 + i * 0.2, 0.5);
      items[i].style.opacity = p; items[i].style.transform = 'translateY(' + B.lerp(20, 0, p) + 'px)'; }
    B.entrance(t, 'cta', 1.6, 0.5, 22);
    B.caption(t, CAPS, 'caption');
  };

  window.BT.init({ splitTitle: false, emberCount: 0, maxFont: FIT.maxFont, minFont: FIT.minFont, maxW: FIT.maxW });
  window.seek(0);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () {
    window.BT.autofitTitle(FIT); window.BT.fitHighlights(460); window.seek(window._T || 0); });
</script>
</body>
</html>
