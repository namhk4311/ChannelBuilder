<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Be+Vietnam+Pro:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --primary: @@PRIMARY@@; --secondary: @@SECONDARY@@; --accent: @@ACCENT@@;
    --tt-fill:#fff; --tt-depth: rgba(0,0,0,0.55); }
  @@TREATMENTS_CSS@@
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:#05060f; }
  body { font-family:'Be Vietnam Pro', system-ui, sans-serif; }
  .stage { position:relative; width:1080px; height:1920px; overflow:hidden; }
  #bg { position:absolute; inset:0; width:100%; height:100%; background-size:cover; background-position:center;
    transform-origin:center; will-change:transform,filter; @@BG_STYLE@@ }
  .scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,6,15,0) 30%, rgba(5,6,15,0.7) 64%, rgba(5,6,15,0.97) 100%); }
  .scan { position:absolute; inset:0; opacity:0.10; mix-blend-mode:overlay;
    background:repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 4px); }
  /* dải nghiêng động */
  .panel { position:absolute; left:0; right:0; bottom:0; height:60%;
    background:linear-gradient(180deg, rgba(7,9,22,0) 0%, rgba(7,9,22,0.55) 26%, rgba(5,7,18,0.96) 70%);
    clip-path: polygon(0 16%, 100% 0, 100% 100%, 0 100%); }
  #dark { position:absolute; inset:0; background:#000; will-change:opacity; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; will-change:opacity; }

  .content { position:absolute; left:0; right:0; bottom:120px; padding:0 80px;
    display:flex; flex-direction:column; align-items:flex-start; text-align:left; gap:20px; }
  #kicker { font-family:'Oswald',sans-serif; font-weight:700; font-size:30px; letter-spacing:5px; text-transform:uppercase;
    color:#05060f; background:var(--accent); padding:8px 22px; transform:skewX(-10deg);
    box-shadow:0 0 24px rgba(255,255,255,0.25); will-change:transform,opacity,filter; }
  #kicker span { display:inline-block; transform:skewX(10deg); }
  #title { font-family:'Oswald', sans-serif; font-weight:700; font-size:104px; line-height:0.94;
    letter-spacing:-1px; text-transform:uppercase; max-width:940px; transform:skewX(-5deg); }
  .tw { display:inline-block; will-change:transform,opacity,filter; }
  #subtitle { font-weight:700; font-size:36px; line-height:1.2; color:#eef1ff; max-width:820px;
    text-shadow:0 2px 14px rgba(0,0,0,0.8); will-change:transform,opacity,filter; }
  .meta { display:flex; gap:14px; flex-wrap:wrap; will-change:transform,opacity,filter; }
  .chip { font-family:'Oswald',sans-serif; font-weight:700; font-size:28px; color:#fff; padding:9px 20px;
    background:rgba(255,255,255,0.06); border-left:4px solid var(--accent); transform:skewX(-10deg); }
  .chip b { color:var(--accent); }
  .highlights { display:flex; flex-direction:column; gap:11px; align-items:flex-start; }
  .hl { font-weight:600; font-size:31px; color:#fdfdff; display:flex; align-items:center; gap:14px;
    will-change:transform,opacity; text-shadow:0 2px 12px rgba(0,0,0,0.7); }
  .hl .dot { width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent;
    border-left:15px solid var(--accent); filter:drop-shadow(0 0 8px var(--accent)); flex:none; }
  #cta { font-family:'Oswald',sans-serif; font-weight:700; font-size:40px; letter-spacing:1px; text-transform:uppercase;
    color:#05060f; padding:18px 50px; background:linear-gradient(100deg,#fff,var(--accent)); transform:skewX(-10deg);
    box-shadow:0 12px 36px rgba(0,0,0,0.5), 0 0 36px rgba(255,255,255,0.2); will-change:transform,opacity; }
  #cta span { display:inline-block; transform:skewX(10deg); }
</style>
</head>
<body>
  <div class="stage">
    <div id="bg"></div>
    <div class="scrim"></div>
    <div class="scan"></div>
    <div class="panel"></div>
    <div id="dark"></div>
    <div class="content">
      <div id="kicker"><span>@@KICKER@@</span></div>
      <h1 id="title" class="tt-extrude">@@TITLE@@</h1>
      @@SUBTITLE_BLOCK@@
      @@META_BLOCK@@
      @@HIGHLIGHTS_BLOCK@@
      <div id="cta"><span>@@CTA@@</span></div>
    </div>
    <div id="flash"></div>
  </div>
<script>@@TIMELINE_JS@@</script>
<script>
  var BPM = 124, PULSE_AMP = 0.012, FLASH_BEATS = [0.2, 1.5];
  window.DURATION_SEC = @@DURATION_SEC@@;

  window.seek = function (t) {
    window._T = t; var B = window.BT;
    var fl = B.flashLevel(t, FLASH_BEATS);
    var rv = B.bg(t, { bpm: BPM, pulseAmp: PULSE_AMP, fl: fl, zoomFrom: 1.05, zoomTo: 1.14, driftY: 8 });

    B.entrance(t, 'kicker', 0.3, 0.55, 0, -40);
    B.entranceWords(t, 0.5, 0.1, 50);
    B.entrance(t, 'subtitle', 1.0, 0.6, 24);
    B.entrance(t, 'period', 1.3, 0.55, 22);
    var items = document.querySelectorAll('.hl'), i;
    for (i = 0; i < items.length; i++) { var p = B.seg(t, 1.6 + i * 0.22, 0.5);
      items[i].style.opacity = p; items[i].style.transform = 'translateX(' + B.lerp(-40, 0, p) + 'px)'; }
    var cs = 1.6 + items.length * 0.22 + 0.2, cp = B.seg(t, cs, 0.55);
    B.set('cta', cp, B.lerp(40, 0, cp), 0, 1);
    var cta = document.getElementById('cta'); if (cta) cta.style.transform = 'skewX(-10deg) translateX(' + B.lerp(40, 0, cp) + 'px)';

    // title: 3D extrude + bùng sáng nhẹ khi flash (đổi độ đậm depth)
    var title = document.getElementById('title');
    if (title) title.style.filter = 'drop-shadow(0 0 ' + (fl * 30) + 'px rgba(255,255,255,' + (fl * 0.6) + '))';
  };

  window.BT.init({ emphasis: 0, maxFont: 112, minFont: 60, maxW: 940 });
  window.seek(0);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () { window.BT.autofitTitle({ maxFont: 112, minFont: 60, maxW: 940 }); window.BT.fitHighlights(420); window.seek(window._T || 0); });
</script>
</body>
</html>
