<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Be+Vietnam+Pro:wght@500;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root { --primary:@@PRIMARY@@; --secondary:@@SECONDARY@@; --accent:@@ACCENT@@;
    --bg:@@BG@@; --text:@@TEXT@@; --muted:@@MUTED@@; --pattern:@@PATTERN@@;
    --tt-accent:var(--accent); --tt-on-accent:var(--bg); }
  @@TREATMENTS_CSS@@
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:var(--bg); }
  body { font-family:'Be Vietnam Pro', system-ui, sans-serif; color:var(--text); }
  .stage { position:relative; width:1080px; height:1920px; overflow:hidden; background:var(--bg); }
  .pattern { position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, var(--pattern) 0 1px, transparent 1px 24px),
      repeating-linear-gradient(-45deg, var(--pattern) 0 1px, transparent 1px 24px); }
  #dark { position:absolute; inset:0; background:var(--bg); will-change:opacity; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; }

  .wrap { position:absolute; left:80px; right:80px; top:300px; }
  #kicker { font-family:'Oswald',sans-serif; font-weight:700; font-size:30px; letter-spacing:5px;
    text-transform:uppercase; will-change:transform,opacity,filter; }
  .row { display:flex; gap:34px; align-items:flex-start; margin-top:44px; }
  #index { font-family:'Archivo Black',sans-serif; font-size:210px; line-height:0.78; color:var(--accent);
    flex:none; will-change:transform,opacity; }
  .col { flex:1; min-width:0; padding-top:12px; }
  #title { font-family:'Be Vietnam Pro',sans-serif; font-weight:800; font-size:88px; line-height:0.98;
    letter-spacing:-1px; }
  .tw { display:inline-block; will-change:transform,opacity,filter; }
  #subtitle { font-weight:600; font-size:38px; line-height:1.25; color:var(--muted); margin-top:24px;
    will-change:transform,opacity,filter; }
  .highlights { display:flex; flex-direction:column; gap:18px; margin-top:40px; }
  .hl { font-weight:700; font-size:32px; display:flex; align-items:flex-start; gap:16px; line-height:1.2; will-change:transform,opacity; }
  .hl .dot { width:14px; height:14px; background:var(--accent); border-radius:3px; flex:none; transform:rotate(45deg); }
  .meta { display:flex; gap:14px; flex-wrap:wrap; margin-top:30px; will-change:transform,opacity; }
  .chip { font-weight:700; font-size:28px; padding:8px 20px; background:var(--accent); color:var(--bg); }
  #cta { position:absolute; left:80px; bottom:240px; font-family:'Oswald',sans-serif; font-weight:700;
    font-size:40px; text-transform:uppercase; letter-spacing:1px; color:var(--bg); background:var(--accent);
    padding:16px 42px; will-change:transform,opacity; }
  #caption { position:absolute; left:70px; right:70px; bottom:120px; text-align:center; font-weight:700;
    font-size:40px; line-height:1.25; color:var(--text); opacity:0; }
</style>
</head>
<body>
  <div class="stage">
    <div class="pattern"></div>
    <div class="wrap">
      <div id="kicker" class="tt-block">@@KICKER@@</div>
      <div class="row">
        <div id="index">@@INDEX@@</div>
        <div class="col">
          <h1 id="title">@@TITLE@@</h1>
          @@SUBTITLE_BLOCK@@
          @@HIGHLIGHTS_BLOCK@@
          @@META_BLOCK@@
        </div>
      </div>
    </div>
    <div id="cta">@@CTA@@</div>
    <div id="caption"></div>
    <div id="dark"></div>
    <div id="flash"></div>
  </div>
<script>@@TIMELINE_JS@@</script>
<script>
  window.DURATION_SEC = @@DURATION_SEC@@;
  var CAPS = @@CAPTIONS_JSON@@;
  var FIT = { maxFont: 92, minFont: 46, maxW: 600 };

  window.seek = function (t) {
    var B = window.BT;
    B.bg(t, { fl: 0 });                       // reveal qua #dark (không có #bg)
    B.entrance(t, 'kicker', 0.25, 0.5, -28);
    B.entrance(t, 'index', 0.4, 0.55, 0, -50);
    B.entranceWords(t, 0.55, 0.09, 44);
    B.entrance(t, 'subtitle', 1.05, 0.55, 22);
    var items = document.querySelectorAll('.hl'), i;
    for (i = 0; i < items.length; i++) { var p = B.seg(t, 1.3 + i * 0.2, 0.5);
      items[i].style.opacity = p; items[i].style.transform = 'translateX(' + B.lerp(-36, 0, p) + 'px)'; }
    B.entrance(t, 'cta', 1.3 + items.length * 0.2 + 0.2, 0.5, 30);
    B.caption(t, CAPS, 'caption');
  };

  window.BT.init({ emphasis: -1, emberCount: 0, maxFont: FIT.maxFont, minFont: FIT.minFont, maxW: FIT.maxW });
  window.seek(0);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () {
    window.BT.autofitTitle(FIT); window.BT.fitHighlights(560); window.seek(window._T || 0); });
</script>
</body>
</html>
